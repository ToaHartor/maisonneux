apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Namespace }}-secretstore
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Namespace }}-secretstore
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Namespace }}-secretstore
    namespace: {{ .Release.Namespace }}
