repository:
  url: http://example.com/myrepo
  branch: main

registry:
  url: example.com:5000
  mirror: example.com:5000

apollo:
  pipelineName: apollo
  targetHelmChart: apollo
  namespace: otoge
  repository:
    url: http://example.com/myrepo
    branch: master
    authServiceAccount: github-build-bot
  containers:
    - name: server
      context: backend/
      target: server
    - name: worker
      context: backend/
      target: worker
    - name: client
      context: frontend/
      target: release

tachi:
  pipelineName: tachi
  targetHelmrelease: tachi
  namespace: otoge
  repository:
    url: https://github.com/zkldi/Tachi
    branch: main # Will be set to commit hash
  parameters:
    serverUrl: https://example.tachi.com
    cdnUrl: https://bucket.example.com/tachi
    recaptchaKey: unset
  containers:
    - name: tachi-client
      context: .
      target: release
