apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: {{ .Values.tachi.pipelineName }}
  namespace: {{ .Release.Namespace }}
spec:
  description: |
    This pipeline clones a git repo, builds a Docker image with Kaniko and
    pushes it to a registry
  params:
  - name: repo-url
    type: string
  - name: revision
    type: string
  # - name: dockerfile-path
  #   type: string
  - name: image-registry
    type: string
  workspaces:
  - name: shared-data
  # Mount build context (Dockerfile) to not have to clone the main repo
  - name: build-ctx
  tasks:
  # Clone the source repo
  - name: fetch-source
    taskRef:
      resolver: bundles
      params:
        - name: bundle
          value: ghcr.io/tektoncd/catalog/upstream/tasks/git-clone:0.10
        - name: name
          value: git-clone
        - name: kind
          value: Task
    workspaces:
    - name: output
      workspace: shared-data
    params:
    - name: url
      value: $(params.repo-url)
    - name: revision
      value: $(params.revision)

  # ==========================
  # Sequential build step : build containers one at a time to not exhaust resources
  {{- $previousLoopTask := "fetch-source" -}}
  {{- range $container := .Values.tachi.containers }}
  # Retrieve image metadata from helm values
  # Output: yq
  # - name: "get-image-meta-{{ $container.name }}"
  #   runAfter:
  #     - {{ $previousLoopTask }}
  #   taskRef:
  #     resolver: git
  #     params:
  #     - name: url
  #       value: https://github.com/tektoncd/catalog.git
  #     - name: revision
  #       value: main
  #     - name: pathInRepo
  #       value: task/yq/0.5/yq.yaml
  #     # Somehow, the OCI bundle for yq does not exist anymore ?
  #     # resolver: bundles
  #     # params:
  #     #   - name: bundle
  #     #     value: ghcr.io/tektoncd/catalog/upstream/tasks/yq:0.5
  #     #   - name: name
  #     #     value: yq
  #     #   - name: kind
  #     #     value: Task
  #   workspaces:
  #   - name: source
  #     workspace: shared-data
  #   params:
  #   - name: SCRIPT
  #     value: |
  #       #! /bin/bash
  #       cp ./openapi/openapi.yaml {{ $container.context }}
  #       echo -n "$(/usr/bin/yq '.apollo.{{ $container.name }}.image.image' ./helm/apollo/values.yaml):$(/usr/bin/yq '.apollo.{{ $container.name }}.image.tag' ./helm/apollo/values.yaml)" | tee $(results.yq.path)
  # Build the Docker image(s) and push to registry
  - name: "kaniko-{{ $container.name }}"
    runAfter:
      # - "get-image-meta-{{ $container.name }}"
      - {{ $previousLoopTask }}
    taskRef:
      name: kaniko-build-configmap
    params:
      - name: CONTEXT
        value: "{{ $container.context }}"
      - name: IMAGE
        value: "$(params.image-registry)/{{ $container.name }}:$(params.revision)"
      - name: TARGET
        value: "{{ $container.target }}"
    workspaces:
      - name: source
        workspace: shared-data
      - name: build-context
        workspace: build-ctx
  {{- $previousLoopTask = printf "kaniko-%s" $container.name }}
  {{- end }}
