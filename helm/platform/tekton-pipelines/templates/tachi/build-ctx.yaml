apiVersion: v1
kind: ConfigMap
metadata:
  name: tachi-build-ctx
  namespace: {{ .Release.Namespace }}
data:
  Dockerfile: |
    # see all versions at https://hub.docker.com/r/oven/bun/tags
    FROM oven/bun:1-alpine AS base

    WORKDIR /app

    FROM base AS build

    COPY . .

    RUN bun install --frozen-lockfile

    ENV NODE_ENV=production
    ENV VITE_TCHIC_MODE=omni
    ENV VITE_SERVER_URL={{ .Values.tachi.parameters.serverUrl }}
    ENV VITE_CDN_URL="{{ .Values.tachi.parameters.cdnUrl }}"
    ENV VITE_GIT_REPO=GitHub:zkldi/Tachi
    ENV VITE_HCAPTCHA_SITEKEY="{{ .Values.tachi.parameters.hcaptchaSiteKey }}"
    ENV VITE_EAG_CLIENT_ID=""
    ENV VITE_MIN_CLIENT_ID=""
    ENV VITE_FLO_CLIENT_ID=""
    ENV VITE_RULES_READ_TIME=1
    ENV VITE_MANDATE_LOGIN=true
    ENV VITE_IS_LOCAL_DEV=false
    ENV TACHI_NAME=Tachi
    ENV FORCE_FS_POLLING=false


    RUN bun run --filter tachi-client build

    FROM nginxinc/nginx-unprivileged:1-alpine as release

    COPY --from=build /app/typescript/client/build /usr/share/nginx/html

    RUN cat << 'EOF' > /etc/nginx/conf.d/default.conf
    server {
      listen       8080;
      server_name  localhost;

      location / {
          root   /usr/share/nginx/html;
          try_files $uri $uri/ /index.html;
          index  index.html index.htm;
      }

      #error_page  404              /404.html;

      # redirect server error pages to the static page /50x.html
      #
      error_page   500 502 503 504  /50x.html;
      location = /50x.html {
          root   /usr/share/nginx/html;
      }
    }
    EOF

    EXPOSE 8080

    CMD ["nginx", "-g", "daemon off;"]
