---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ${PSQL_RO_USER}-db-user
spec:
  dependsOn:
    - name: psql-cluster
      namespace: ${psql_database_namespace}
  healthChecks:
    - name: ${PSQL_DB_NAME}
      namespace: ${psql_database_namespace}
      kind: Database
      apiVersion: postgresql.cnpg.io/v1
  interval: 1h
  path: "./kubernetes/common/components/cnpg/ro-user/app"
  postBuild:
    substitute:
      PSQL_RO_USER: ${PSQL_RO_USER}
      PSQL_DB_NAME: ${PSQL_DB_NAME}
      # inherited variables
      psql_cluster_name: ${psql_cluster_name}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  # We want to declare the database in the same namespace as the cluster
  targetNamespace: ${psql_database_namespace}
  timeout: 10m
