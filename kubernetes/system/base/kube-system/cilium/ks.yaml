---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cilium
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: cilium
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cilium
      namespace: kube-system
  interval: 1h
  path: "./kubernetes/system/base/kube-system/cilium/app"
  postBuild:
    substitute:
      # inherited variables
      control_plane_endpoints: ${control_plane_endpoints}
      cluster_pod_cidr: ${cluster_pod_cidr}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kube-system
  timeout: 10m
