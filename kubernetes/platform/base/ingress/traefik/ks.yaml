---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/gitrepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway-api
spec:
  interval: 1h
  ref:
    tag: v1.5.1
  url: https://github.com/kubernetes-sigs/gateway-api

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gateway-api-crds
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: traefik
  # healthChecks:
  #   - apiVersion: helm.toolkit.fluxcd.io/v2
  #     kind: HelmRelease
  #     name: traefik-crds
  #     namespace: ingress
  interval: 1h
  path: "./config/crd"
  prune: false
  sourceRef:
    kind: GitRepository
    name: gateway-api
  targetNamespace: ingress
  timeout: 5m

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
spec:
  dependsOn:
    - name: gateway-api-crds
    - name: cert-manager-webhook-ovh
      namespace: cert-manager
    # - name: crowdsec
  commonMetadata:
    labels:
      app.kubernetes.io/name: traefik
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: traefik
      namespace: ingress
  interval: 1h
  path: "./kubernetes/platform/base/ingress/traefik/app"
  postBuild:
    substitute:
      # inherited variables
      main_domain: ${main_domain}
      second_domain: ${second_domain}
      traefik_lb_ip: ${traefik_lb_ip}
      traefik_web_lb_port: ${quote}${traefik_web_lb_port}${quote}
      traefik_websecure_lb_port: ${quote}${traefik_websecure_lb_port}${quote}
      traefik_ssh_lb_port: ${quote}${traefik_ssh_lb_port}${quote}

  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ingress
  timeout: 10m
