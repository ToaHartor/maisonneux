---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tekton-pipelines
spec:
  releaseName: tekton-pipelines
  chart:
    spec:
      chart: helm/platform/tekton-pipelines
      interval: 12h
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  interval: 50m
  install:
    createNamespace: true
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: tachi-external-secrets
      valuesKey: captcha_token
      targetPath: tachi.parameters.hcaptchaSiteKey
    - kind: Secret
      name: tachi-external-secrets
      valuesKey: cdn_web_location
      targetPath: tachi.parameters.cdnUrl

  values:
    # Propagate fluxcd values to the chart
    repository:
      url: ${git_repo_url}
      branch: ${git_branch}
    registry:
      url: zot.internal-ci.svc.cluster.local:5000
      mirror: zot.internal-ci.svc.cluster.local:5000/v2
    storage:
      persistentClassName: ${fastdata_storage}-ephemeral
    # Pipelines
    apollo:
      repository:
        url: https://github.com/gigacigne/apollo
        branch: develop # main
        authServiceAccount: github-build-bot

    tachi:
      repository:
        # renovate gitref: depName=https://github.com/zkldi/Tachi gitRef=main
        branch: a815848fb623151249c6057191f6db3883621b5e
      parameters:
        serverUrl: https://xn--sck3h9451a.${second_domain}
        # https://garage.${second_domain}/tachi-${environment}
        # cdnUrl: # Set with valuesFrom
        # recaptchaKey: # Set with valuesFrom
