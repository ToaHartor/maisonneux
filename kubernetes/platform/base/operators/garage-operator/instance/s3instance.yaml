---
# yaml-language-server: $schema=https://raw.githubusercontent.com/rajsinghtech/garage-operator/refs/heads/main/schemas/garagecluster_v1beta2.json
apiVersion: garage.rajsingh.info/v1beta2
kind: GarageCluster
metadata:
  name: garage-gateway
spec:
  logging:
    level: "info"

  gateway:
    replicas: 1
    priorityClassName: services-critical
    rpcPublicAddr: ${opnsense_exposed_ip}:39001
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metadata:
      # We need to add pvc backup label (feature request submitted)
      labels:
        homelab/backup-resource: "true"
      type: PersistentVolumeClaim
      size: 1Gi
      storageClassName: ${fastdata_storage}-ha
    securityContext:
      # runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]

  admin:
    adminTokenSecretRef:
      key: GARAGE_ADMIN_TOKEN
      name: garage-external-secret

  connectTo:
    bootstrapPeers:
      - "${garage_bootstrap_node}" # <hash>@ip:port
    rpcSecretRef:
      key: GARAGE_RPC_SECRET
      name: garage-external-secret
    adminApiEndpoint: http://${garage_admin_endpoint}
    adminTokenSecretRef:
      key: GARAGE_ADMIN_TOKEN
      name: garage-external-secret

  network:
    # rpcPublicAddr: ${opnsense_exposed_ip}:39001
    rpcBindPort: 39001
    rpcSecretRef:
      key: GARAGE_RPC_SECRET
      name: garage-external-secret

  publicEndpoint:
    type: NodePort
    nodePort:
      basePort: 30901
      externalAddresses:
        - ${opnsense_exposed_ip}

  zone: nas

  s3Api:
    region: garage
    bindPort: ${GARAGE_S3_PORT}

  replication:
    factor: 1 # Must match the external cluster

  database:
    engine: sqlite # From recommended gateway configuration https://deepwiki.com/rajsinghtech/garage-operator/3.1.5-database-and-block-storage#low-resource-gateway-cluster


  # storage:
  #   replicas: 0
  #   metadata:
  #     # We need to add pvc backup label (feature request submitted)
  #     labels:
  #       homelab/backup-resource: "true"
  #     type: PersistentVolumeClaim
  #     size: 1Gi
  #     storageClassName: ${fastdata_storage}-ha
  #   data:
  #     type: EmptyDir # Gateway nodes do not store any block data
