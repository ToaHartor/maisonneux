---
# https://grafana.com/grafana/dashboards/14837-authentik/
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: garage-operator
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 30s
  datasources:
    - datasourceName: Metrics as prometheus
      inputName: DS_PROMETHEUS
  configMapRef:
    name: garage-operator-garage-dashboard
    key: garage-prometheus.json
