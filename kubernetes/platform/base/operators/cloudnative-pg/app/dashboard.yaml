---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: cnpg
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 30s
  datasources:
    - datasourceName: Metrics as prometheus
      inputName: DS_PROMETHEUS
  configMapRef:
    name: cnpg-grafana-dashboard
    key: cnp.json
