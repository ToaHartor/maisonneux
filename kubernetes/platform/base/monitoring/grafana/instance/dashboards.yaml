---
# https://grafana.com/grafana/dashboards/14837-authentik/
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: authentik
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  grafanaCom:
    id: 14837
    revision: 2
  datasources:
    - datasourceName: Metrics as prometheus
      inputName: DS_PROMETHEUS
