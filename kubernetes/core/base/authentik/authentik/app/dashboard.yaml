apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: authentik
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 30s
  grafanaCom:
    id: 14837
    revision: 2
  datasources:
    - datasourceName: Metrics as prometheus
      inputName: DS_PROMETHEUS
