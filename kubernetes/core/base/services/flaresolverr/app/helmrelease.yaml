---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app flaresolverr
spec:
  releaseName: *app
  chartRef:
    kind: OCIRepository
    name: *app
  maxHistory: 2
  interval: 50m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      flaresolverr:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
          prometheus.io/scrape: "true"
          prometheus.io/port: "8192"
          prometheus.io/path: "/metrics"
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: ghcr.io/flaresolverr/flaresolverr
              tag: v3.5.0@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
            resources:
              requests:
                cpu: 15m
                memory: 150Mi
              limits:
                memory: 512Mi
            env:
              # TEST_URL: "https://www.google.com"
              # BROWSER_TIMEOUT: 40000
              PORT: "8191"
              HOST: "0.0.0.0"
              HEADLESS: true
              LOG_LEVEL: info
              LOG_HTML: false
              # At this time none of the captcha solvers work, defaults to none.
              CAPTCHA_SOLVER: none
              PROMETHEUS_ENABLED: true
              PROMETHEUS_PORT: &monit-port 8192

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false # Must be set to false
              capabilities:
                drop:
                  - ALL

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8191
                  periodSeconds: 10
                  # /health responds slowly while Chromium is busy solving a
                  # challenge; the 1s default timeout killed healthy pods
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8191
                  failureThreshold: 30
                  periodSeconds: 5
    service:
      app:
        controller: flaresolverr
        type: ClusterIP
        ports:
          http:
            port: 8191
          metrics:
            port: *monit-port
