  ref:
    tag: 0.33.0
    digest: sha256:de8f9287d2a4aa032b5ada2d00fe7f69945ac508c74618ac0cc9ff0a21bf1d82
  url: oci://ghcr.io/stacklok/toolhive/toolhive-operator
