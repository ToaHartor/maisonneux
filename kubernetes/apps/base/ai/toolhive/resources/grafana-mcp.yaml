---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name grafana-mcp
spec:
  dataFrom:
    - extract:
        key: *name
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: monitoring-secretstore
  target:
    name: *name
    creationPolicy: Owner
    deletionPolicy: Retain
---
apiVersion: toolhive.stacklok.dev/v1beta1
kind: MCPServer
metadata:
  name: grafana-mcp
spec:
  # renovate container:
  image: docker.io/grafana/mcp-grafana:0.17.0-alpine@sha256:b607a0959ff7c5619a9a3295a4c0bc1dbf01adf138fd2a648f96e4634a3ae15b
  args: ["-t", "stdio"]
  transport: stdio
  groupRef:
    name: mcp-tools
  env:
    - name: GRAFANA_URL
      value: http://grafana-service.monitoring.svc.cluster.local:3000
  secrets:
    - name: grafana-mcp
      key: token
      targetEnvName: GRAFANA_SERVICE_ACCOUNT_TOKEN
  podTemplateSpec:
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp
          resources:
            limits:
              cpu: "500m"
            requests:
              cpu: "10m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
  resources:
    limits:
      cpu: 200m
      memory: 100Mi
    requests:
      cpu: 10m
      memory: 100Mi
