---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive-operator-crds
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: toolhive-operator-crds
      namespace: ai
  interval: 1h
  path: "./kubernetes/apps/base/ai/toolhive/crds"
  postBuild:
    substitute:
      APP: toolhive
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 10m
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive-operator
spec:
  dependsOn:
    - name: toolhive-operator-crds
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: toolhive-operator
      namespace: ai
  interval: 1h
  path: "./kubernetes/apps/base/ai/toolhive/app"
  postBuild:
    substitute:
      APP: toolhive
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 10m
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: toolhive-operator-resources
spec:
  dependsOn:
    - name: toolhive-operator-crds
    - name: toolhive-operator
    # Wait for apps to be created
    - name: grafana
      namespace: monitoring
    - name: sonarr
      namespace: media
    - name: radarr
      namespace: media
    - name: prowlarr
      namespace: media
  commonMetadata:
    labels:
      app.kubernetes.io/name: toolhive
  healthChecks:
    - apiVersion: toolhive.stacklok.dev/v1alpha1
      kind: MCPServer
      name: grafana-mcp
      namespace: ai
    # - apiVersion: helm.toolkit.fluxcd.io/v2
    #   kind: HelmRelease
    #   name: toolhive-oidc
    #   namespace: ai
  healthCheckExprs:
    - apiVersion: toolhive.stacklok.dev/v1alpha1
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
      inProgress: status.conditions.filter(e, e.type == 'Ready').all(e, e.reason == 'NotReady')
      kind: MCPServer
  interval: 1h
  # components:
  # # relative to spec.path
  # - ../../../../../common/components/oidc-application
  path: "./kubernetes/apps/base/ai/toolhive/resources"
  postBuild:
    substitute:
      APP: toolhive
      # GROUP: Services
      # SUBDOMAIN: toolhive
      # DOMAIN: ${main_domain}
      # DOMAIN_WEBSECURE: ${main_domain_websecure}
      # DESCRIPTION: MCP server tools
      # OIDC_CLIENT_ID: "toolhivemcpoidc" # Client ID is known
      # REDIRECT_URL: https://toolhive.${main_domain_websecure}/oauth/callback
      # # inherited variables
      # auth_subdomain: ${auth_subdomain}
      # main_domain: ${main_domain}
      # main_domain_websecure: ${main_domain_websecure}
  # patches:
  #   - target:
  #       kind: HelmRelease
  #       # match with label since name has variable in it
  #       labelSelector: homelab/auth-component=true
  #     patch: |
  #       - op: add
  #         path: '/spec/values/blueprint/groups/-'
  #         value:
  #           slug: "app: toolhive"
  #           bindID: "c5d96ed1-cb7a-437e-8e5b-0ef11845724d" # arbitrary uuid
  #       - op: add
  #         path: '/spec/values/blueprint/provider/oidc/clientID'
  #         value: 'toolhivemcpoidc'
  #       - op: add
  #         path: '/spec/values/blueprint/provider/oidc/scopes/-'
  #         value:
  #           name: "authentik default OAuth Mapping: OpenID 'offline_access'"
  #       - op: remove
  #         path: '/spec/values/blueprint/application/launchURL'

  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  timeout: 10m
