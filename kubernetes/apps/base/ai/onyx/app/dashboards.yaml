---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: onyx-indexing-pipeline
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 30s
  datasources:
    - datasourceName: Metrics as prometheus
      inputName: DS_PROMETHEUS
  configMapRef:
    name: onyx-indexing-pipeline-dashboard
    key: onyx-indexing-pipeline.json
