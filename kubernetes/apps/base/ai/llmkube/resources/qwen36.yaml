---
# Current working and fast setup
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen36-35b-a3b-iq2-m
spec:
  # source: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-IQ3_S.gguf
  source: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-IQ2_M.gguf
  format: gguf
  quantization: IQ2_M
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
      # memory: 14Gi
    # memoryBudget: 14Gi
  resources:
    cpu: "6"
    memory: 16Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen36-35b-a3b-q4-k-xl
spec:
  source: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-MTP-GGUF/resolve/main/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf
  format: gguf
  quantization: Q4_K_XL
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
      # memory: 14Gi
    # memoryBudget: 14Gi
  resources:
    cpu: "6"
    memory: 16Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen36-27b-iq4-xs
spec:
  source: https://huggingface.co/Ununnilium/Qwen3.6-27B-IQ4_XS-pure-GGUF/resolve/main/qwen3.6-27b-IQ4_XS-pure.gguf
  format: gguf
  quantization: IQ4_XS
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
    #   memory: 14Gi
    # memoryBudget: 14Gi
  resources:
    cpu: "6"
    memory: 16Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen36-27b-iq4-xs-dflash
spec:
  source: https://huggingface.co/Anbeeld/Qwen3.6-27B-DFlash-GGUF/resolve/main/Qwen3.6-27B-DFlash-IQ4_XS.gguf
  format: gguf
  quantization: IQ4_XS
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
    #   memory: 14Gi
    # memoryBudget: 14Gi
  resources:
    cpu: "6"
    memory: 16Gi
---
apiVersion: inference.llmkube.dev/v1alpha1
kind: Model
metadata:
  name: qwen36-27b-iq4-xs-mtp
spec:
  source: https://huggingface.co/GianniDPC/Qwen3.6-27B-IQ4_XS-pure-with-MTP-GGUF/resolve/main/qwen3.6-27b-IQ4_XS-pure-with-MTP-IQ4.gguf
  format: gguf
  quantization: IQ4_XS
  hardware:
    accelerator: cuda
    gpu:
      enabled: true
      vendor: nvidia
      count: 1
      layers: 99
    #   memory: 14Gi
    # memoryBudget: 14Gi
  resources:
    cpu: "6"
    memory: 16Gi

---
apiVersion: inference.llmkube.dev/v1alpha1
kind: InferenceService
metadata:
  name: qwen36
spec:
  # Parameters from https://github.com/5p00kyy/club-5060ti/blob/main/docs/single-5060ti.md
  ## ! Select first the dflash then the real model
  modelRef: qwen36-27b-iq4-xs-mtp
  runtimeClassName: ${gpu_runtime_class}
  runtime: llamacpp
  # https://github.com/ggml-org/llama.cpp/pkgs/container/llama.cpp/versions?filters[version_type]=tagged
  # image: ghcr.io/ggml-org/llama.cpp:server-cuda13-b9843
  # https://github.com/ikawrakow/ik_llama.cpp/pkgs/container/ik-llama-cpp/versions?filters[version_type]=tagged
  # image: ghcr.io/ikawrakow/ik-llama-cpp:cu13-server-4672
  # BeeLlama image https://github.com/Anbeeld/beellama.cpp
  # renovate container:
  image: ghcr.io/anbeeld/beellama.cpp:server-cuda13-preview-v0.3.2
  replicas: 1
  endpoint:
    port: 8080
    type: ClusterIP
  priority: high
  evictionProtection: false
  contextSize: 65536 # 32768 # -c
  flashAttention: true # -fa
  parallelSlots: 1 # -np
  cacheTypeCustomK: kvarn4 # q5_0 # turbo4
  cacheTypeCustomV: kvarn4 # q4_0 # turbo3_tcq
  batchSize: 512 # 1024 # -b
  uBatchSize: 256 # 256 # 512 # -ub
  # moeCPULayers: 17  # Too slow
  # moeCPUOffload: true # Offload all expert layers to CPU

  # noKvOffload: true # KV in RAM instead of VRAM if offload
  reasoningBudget: 4096 # 512 # Necessary for models like Qwen
  # skipModelInit:
  # tensorOverrides:
  nodeSelector:
    nvidia.com/gpu.present: "true"
  env:
    - name: HF_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-token
          key: HF_TOKEN
  podSecurityContext:
    # runAsNonRoot: true
    # runAsUser: 101 # curl_user
    seccompProfile:
      type: RuntimeDefault
  # priorityClassName:
  extraArgs:
    # https://github.com/ggml-org/llama.cpp/blob/master/tools/server/README.md
    # https://github.com/ikawrakow/ik_llama.cpp/blob/main/docs/parameters.md
    - --alias
    - qwen36_27B
    # Log level
    - -lv
    - "4"
    # - --spec-draft-hf
    # - "Anbeeld/Qwen3.6-27B-DFlash-GGUF:IQ4_XS"
    - --spec-type
    - draft-mtp,ngram-mod
    # - dflash
    # - --spec-dflash-cross-ctx
    # - "512"
    - -ngl
    - all
    # - --spec-draft-ngl
    # - all
    # - --spec-default
    # - "on"
    - --spec-draft-n-max
    - "2"
    # - --spec-draft-p-min
    # - "0.75"
    - --no-mmap # No keep model in ram
    # - --spec-draft-model
    # - /models/5b4369128cc20c4a/qwen36-27b-iq4-xs-dflash.gguf
    - --jinja
    # - --ctx-checkpoints
    # - "128"
    # - --threads
    # - "6"
    - --temp
    - "0.8"
    - --top-p
    - "0.95"
    - --min-p
    - "0.00"
    - --top-k
    - "20"
    - --presence-penalty
    - "0.0"
    - --repeat-penalty
    - "1.0"
    - --fit
    - "on"
    - --kv-unified
    - --cache-ram
    - "0"
    - --chat-template-kwargs
    - '{"preserve_thinking": true}'
    # ik_llama specific settings
    # - --defer-experts
    # - --spec-type
    # - mtp
    # - -mtp
    # - --draft-max
    # - "2"

  # podLabels:
  #   app.kubernetes.io/name: llmkube
  # podAnnotations:
  #   sidecar.istio.io/inject: "true"
  resources:
    gpu: 1
    cpu: "2"
    gpuMemory: 14Gi
    hostMemory: 10Gi
    memory: 12Gi

