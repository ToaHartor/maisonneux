---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: searxng
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: searxng
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: searxng
      namespace: services
  interval: 1h
  components:
    #   # relative to spec.path
    - ../../../../../common/components/secret/key
  #   - ../../../../../common/components/httproute/common
  path: "./kubernetes/apps/base/services/searxng/app"
  postBuild:
    substitute:
      APP: searxng
      # SUBDOMAIN: atuin
      # DOMAIN: ${main_domain}
      # DOMAIN_WEBSECURE: ${main_domain_websecure}
      # GROUP: Services
      # DESCRIPTION: Shell history database
      # GATEWAY_SVC_NAME: atuin
      # GATEWAY_SVC_PORT: "8888"
      ## Generated secrets
      SECRET_KEY_NAME: searxng-secretkey
      SECRET_KEY_TYPE: secret-key
      # inherited variables
      main_domain: ${main_domain}
      main_domain_websecure: ${main_domain_websecure}
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: services
  timeout: 10m
