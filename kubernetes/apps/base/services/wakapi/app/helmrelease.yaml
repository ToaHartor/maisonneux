---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wakapi
spec:
  releaseName: wakapi
  dependsOn:
    - name: ${APP}-oidc
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 50m
  install:
    createNamespace: true
    remediation:
      retries: 3
  values:
    controllers:
      wakapi:
        annotations:
          # Reload pod on secret/cm change. As we use external secrets with valuesfrom (so not mounted in the deployment), we need to tell which resources to watch
          secret.reloader.stakater.com/reload: "${SECRET_KEY_NAME},${APP}-db-creds,${APP}-oidc-authentik-application"
        type: deployment
        strategy: RollingUpdate
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 1
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          main:
            securityContext:
              capabilities:
                drop:
                  - ALL
            image:
              repository: ghcr.io/muety/wakapi
              tag: 2.17.3@sha256:156e3e60656f6143f58cc849444a0a7992bbaa573dc870d92a9789be5671099d
              pullPolicy: IfNotPresent
            env:
              - name: ENVIRONMENT
                value: prod
              - name: WAKAPI_PORT
                value: ${GATEWAY_SVC_PORT}
              - name: WAKAPI_PUBLIC_URL
                value: "https://${SUBDOMAIN}.${DOMAIN_WEBSECURE}"
              - name: WAKAPI_ALLOW_SIGNUP
                value: "false"
              - name: WAKAPI_EXPORT_METRICS
                value: "false"
              - name: WAKAPI_INSECURE_COOKIES
                value: "false" # You need to set this to 'true' when on localhost
              - name: WAKAPI_PASSWORD_SALT
                valueFrom:
                  secretKeyRef:
                    name: ${SECRET_KEY_NAME}
                    key: secretKey
              - name: WAKAPI_DB_USER
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-db-creds
                    key: username
              - name: WAKAPI_DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-db-creds
                    key: password
              - name: WAKAPI_DB_HOST
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-db-creds
                    key: host
              - name: WAKAPI_DB_PORT
                value: "5432"
              - name: WAKAPI_DB_TYPE
                value: postgres
              - name: WAKAPI_DB_NAME
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-db-creds
                    key: dbname
              # Set wakapi mail settings
              - name: WAKAPI_MAIL_ENABLED
                value: "false"
              # OIDC settings
              - name: WAKAPI_OIDC_ALLOW_SIGNUP
                value: "true"
              - name: WAKAPI_DISABLE_LOCAL_AUTH
                value: "true"
              - name: WAKAPI_OIDC_PROVIDERS_0_NAME
                value: "authentik"
              - name: WAKAPI_OIDC_PROVIDERS_0_DISPLAY_NAME
                value: "Authentik"
              - name: WAKAPI_OIDC_PROVIDERS_0_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-oidc-authentik-application
                    key: clientID
              - name: WAKAPI_OIDC_PROVIDERS_0_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-oidc-authentik-application
                    key: clientSecret
              - name: WAKAPI_OIDC_PROVIDERS_0_ENDPOINT
                valueFrom:
                  secretKeyRef:
                    name: ${APP}-oidc-authentik-application
                    key: issuerURL
            resources:
              requests:
                cpu: 100m
                memory: 75Mi
              limits:
                cpu: 500m
                memory: 200Mi
            ports:
              - containerPort: ${GATEWAY_SVC_PORT}
                name: http
                protocol: TCP
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                  httpGet:
                    path: /api/health
                    port: ${GATEWAY_SVC_PORT}
              readiness:
                enabled: true
                custom: true
                spec:
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                  httpGet:
                    path: /api/health
                    port: ${GATEWAY_SVC_PORT}

    service:
      main:
        controller: wakapi
        ports:
          http:
            port: ${GATEWAY_SVC_PORT}

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - subPath: data
            path: /data
