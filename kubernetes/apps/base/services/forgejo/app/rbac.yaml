apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgejo-provisioner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-manager
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get"] # 'get' is needed for the check, 'create' to make it
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgejo-secret-manager
subjects:
  - kind: ServiceAccount
    name: forgejo-provisioner
roleRef:
  kind: Role
  name: secret-manager
  apiGroup: rbac.authorization.k8s.io
