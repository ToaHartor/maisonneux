---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app outline
spec:
  releaseName: *app
  dependsOn:
    - name: ${APP}-oidc
  chartRef:
    kind: OCIRepository
    name: *app
  maxHistory: 2
  interval: 50m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  # Patch only when local dns is used
  # Using postRenderers instead of patches in kustomizations, as variable substitution is not performed already
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              - op: add
                path: /spec/template/spec/hostAliases
                value:
                  - ip: "${traefik_lb_ip}"
                    hostnames:
                    - "${auth_subdomain}.${main_domain}"
                    - "${second_domain}"
            target:
              kind: Deployment
              name: outline
              namespace: services
              annotationSelector: homelab/use-local-dns=true
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    controllers:
      outline:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
          homelab/use-local-dns: ${quote}${patch_dns:=false}${quote}
        containers:
          app:
            image:
              repository: docker.io/outlinewiki/outline
              tag: 1.9.0@sha256:6744a369271ce3c5a37316e5bfc5311d8d4452eb5ee4ca9560c96c15fd718a39
            env:
              TZ: Europe/Paris
              URL: https://${SUBDOMAIN}.${DOMAIN_WEBSECURE}
              PORT: &port ${GATEWAY_SVC_PORT}
              ENABLE_UPDATES: false
              LOG_LEVEL: debug

              # WARNING : ONLY FOR DEBUG https://github.com/outline/outline/discussions/2606
              # NODE_TLS_REJECT_UNAUTHORIZED: "0"
              NODE_ENV: production
              PGSSLMODE: disable

              # Database
              DATABASE_URL:
                secretKeyRef:
                  name: ${PSQL_DB_USER}-db-creds
                  key: uri
              REDIS_URL: redis://dragonfly-cluster.dragonfly.svc.cluster.local:6379
              SECRET_KEY:
                secretKeyRef:
                  name: ${SECRET_KEY_NAME}
                  key: secretKey
              UTILS_SECRET:
                secretKeyRef:
                  name: ${SECRET2_KEY_NAME}
                  key: secretKey

              # OIDC
              OIDC_CLIENT_ID:
                secretKeyRef:
                  # {oidc-release-name}-{chart-name}
                  name: ${APP}-oidc-authentik-application
                  key: clientID
              OIDC_CLIENT_SECRET:
                secretKeyRef:
                  name: ${APP}-oidc-authentik-application
                  key: clientSecret
              OIDC_AUTH_URI: https://${auth_subdomain}.${main_domain_websecure}/application/o/authorize/
              OIDC_TOKEN_URI: https://${auth_subdomain}.${main_domain_websecure}/application/o/token/
              OIDC_USERINFO_URI: https://${auth_subdomain}.${main_domain_websecure}/application/o/userinfo/
              OIDC_LOGOUT_URI: https://${auth_subdomain}.${main_domain_websecure}/application/o/${APP}/end-session/
              OIDC_USERNAME_CLAIM: preferred_username
              OIDC_DISPLAY_NAME: Authentik
              OIDC_SCOPES: openid profile email

              # S3
              FILE_STORAGE: s3
              AWS_ACCESS_KEY_ID:
                secretKeyRef:
                  name: "${S3_USER}-garage"
                  key: accessKey
              AWS_SECRET_ACCESS_KEY:
                secretKeyRef:
                  name: "${S3_USER}-garage"
                  key: secretKey
              AWS_REGION:
                secretKeyRef:
                  name: "${S3_USER}-garage"
                  key: region
              # AWS_S3_ACCELERATE_URL:
              AWS_S3_UPLOAD_BUCKET_URL: https://garage.${main_domain}
              AWS_S3_UPLOAD_BUCKET_NAME: ${BUCKET_NAME}
              AWS_S3_FORCE_PATH_STYLE: "true"
              AWS_S3_ACL: private

              WEB_CONCURRENCY: "1"
              FILE_STORAGE_IMPORT_MAX_SIZE: "5120000"
              FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"

              # SMTP options
              # SMTP_HOST:
              # SMTP_PORT:
              # SMTP_FROM_EMAIL:
              # SMTP_SECURE:
            ports:
              - containerPort: *port
                name: http
                protocol: TCP
            probes:
              liveness: &probe
                enabled: true
                type: HTTP
                path: "/_health"
              readiness: *probe
              startup: *probe

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 200m
                memory: 400Mi
              limits:
                memory: 800Mi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      tmpfs:
        type: emptyDir
        advancedMounts:
          outline:
            app:
              - path: /home/node
                subPath: node
              - path: /tmp
                subPath: tmp
