---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
---
apiVersion: v1
kind: Secret
metadata:
  name: external-forgejo-secrets
  namespace: external-secrets
type: Opaque
stringData:
  signing_private_key: privatekey
  signing_public_key: publickey
---
apiVersion: v1
kind: Secret
metadata:
  name: external-garage-secrets
  namespace: external-secrets
type: Opaque
stringData:
  garage_admin_token: admintoken
  garage_rpc_secret: rpcsecret
---
apiVersion: v1
kind: Secret
metadata:
  name: external-github-sa
  namespace: external-secrets
type: Opaque
stringData:
  githubAppID: "123456"
  githubAppInstallationID: "123456"
  githubAppPrivateKey: privatekey
  username: admin
  password: admin
---
apiVersion: v1
kind: Secret
metadata:
  name: external-gluetun-config
  namespace: external-secrets
type: Opaque
stringData:
  private_key: privatekey
---
apiVersion: v1
kind: Secret
metadata:
  name: external-hf-config
  namespace: external-secrets
type: Opaque
stringData:
  hf_token: hf_token
---
apiVersion: v1
kind: Secret
metadata:
  name: external-minio-secrets
  namespace: external-secrets
type: Opaque
stringData:
  access_key: accesskey
  secret_key: secretkey
---
apiVersion: v1
kind: Secret
metadata:
  name: external-ovh-secrets
  namespace: external-secrets
type: Opaque
stringData:
  admin_email: admin@example.com
  application_key: appkey
  application_secret: appsecret
  consumer_key: consumerkey
  endpoint_name: ovh-eu
---
apiVersion: v1
kind: Secret
metadata:
  name: external-smtp-config
  namespace: external-secrets
type: Opaque
stringData:
  smtp_username: admin@example.com
  smtp_server: smtp.example.com
  smtp_port: "587"
  smtp_token: smtptoken
---
apiVersion: v1
kind: Secret
metadata:
  name: external-sources-secrets
  namespace: external-secrets
type: Opaque
stringData:
  dockerhub_token: dckr_pat_token
  dockerhub_username: admin
  github_pat: github_pat_token
---
apiVersion: v1
kind: Secret
metadata:
  name: external-tachi-config
  namespace: external-secrets
type: Opaque
stringData:
  captcha_secret_key: captchakey
  captcha_token: captcha-token
  cdn_access_key: accesskey
  cdn_bucket: tachi
  cdn_endpoint: https://bucket.example.com
  cdn_region: us-east1
  cdn_secret_key: secretkey
  cdn_web_location: https://bucket.example.com/tachi
