# Create secrets that are usually reconciled by ExternalSecrets
---
apiVersion: v1
kind: Secret
metadata:
  name: forgejo-oidc-authentik-application
  namespace: services
type: Opaque
stringData:
  clientID: clientid
  clientSecret: clientsecret
---
apiVersion: v1
kind: Secret
metadata:
  name: immich-oidc-authentik-application
  namespace: services
type: Opaque
stringData:
  clientID: clientid
  clientSecret: clientsecret
  issuerURL: https://issuer.example.com
---
apiVersion: v1
kind: Secret
metadata:
  name: opencloud-oidc-authentik-application
  namespace: services
type: Opaque
stringData:
  clientID: clientid
---
apiVersion: v1
kind: Secret
metadata:
  name: renovate-operator-oidc-authentik-application
  namespace: services
type: Opaque
stringData:
  clientID: clientid
  clientSecret: clientsecret
  issuerURL: https://issuer.example.com
  redirectURL: https://issuer.example.com
---
apiVersion: v1
kind: Secret
metadata:
  name: smtp-config
  namespace: services
type: Opaque
stringData:
  smtp_username: admin
  smtp_token: token
  smtp_server: smtp.example.com
  smtp_port: "587"
---
apiVersion: v1
kind: Secret
metadata:
  name: cert-manager-ovh-values-secrets
  namespace: cert-manager
type: Opaque
stringData:
  email: admin@example.com
  endpointName: ovh-eu
