---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

# TODO : CI is currently broken on OIDC applications, flate may bring additional corrections for that
# We still run the job but if it fails because of OCIRepository for oidc application we skip

on:
  workflow_dispatch:
  pull_request:
    branches:
      - localdev

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            kubernetes/**/*
            .forgejo/workflows/flate.yaml
  flate:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    # name: Flate - Test ${{ matrix.resource }}
    name: Flate - Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      # We point to a fake Kustomization that renders fake secrets/configmaps and creates another Kustomization that points at the production stack
      FLATE_PATH: ./kubernetes/clusters/test # Used in all flate commands instead of --path <path>
      FLATE_OUTPUT: gitea
    # strategy:
    #   matrix:
    #     resource:
    #       - helmrelease
    #       - kustomization
    #   fail-fast: false
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # all history for all branches and tags
          persist-credentials: false

      - name: Install flate
        uses: https://github.com/home-operations/flate/action@a13598d5cb2faa79c2638e7bfe61711b1a1c1a5f # v0.4.9
        with:
          # Defaults to ${{ github.token }} — a Forgejo-issued token that github.com
          # rejects (401). flate's release is public, so force the unauthenticated path.
          token: ""
          cache: false

      - name: Run flate test
        run: |-
          flate test all --allow-missing-secrets --log-level "debug"

      - name: Run flate diff
        id: diff
        run: |-
          out=$(flate diff all --allow-missing-secrets --output gitea)
          echo "Changes:"
          echo "${out}"
          {
            echo 'diff<<EOF'
            if [[ -n "$out" ]]; then
              echo '```diff'
              echo "$out"
              echo '```'
            fi
            echo 'EOF'
          } >> "${FORGEJO_OUTPUT}"

      - name: Add Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        env:
          GH_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
          MARKER: "<!-- sticky-comment: flate -->"
          HEADER: "Changes:"
          DIFF_CONTENT: ${{ steps.diff.outputs.diff }}
        run: |-
          DIFF_LENGTH=${#DIFF_CONTENT}

          if [[ ${DIFF_LENGTH} -gt 60000 ]]; then
            RUN_URL="${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/actions/runs/${{ forgejo.run_id }}"
            BODY=$(printf $'%%s\n<details open>\n  <summary>%s (%%d chars — too large to post)</summary>\n\nDiff exceeds size limit. View the [workflow run](%%s) for full output.</details>' \
              "${MARKER}" "${HEADER}" "${DIFF_LENGTH}" "${RUN_URL}")
          else
            BODY=$(printf $'%s\n<details open>\n  <summary>%s</summary>\n\n```diff\n%s\n```\n\n</details>' \
              "${MARKER}" "${HEADER}" "${DIFF_CONTENT}")
          fi

          BODY_JSON=$(jq -Rs '{"body": .}' <<< "${BODY}")

          COMMENT_ID=$(curl -s \
            -H "Authorization: token ${GH_TOKEN}" \
            "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
            | jq -r --arg marker "${MARKER}" '.[] | select(.body | startswith($marker)) | .id' | head -1)

          if [[ -n "${COMMENT_ID}" ]]; then
            curl -s -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/comments/${COMMENT_ID}" \
              -d "${BODY_JSON}"
          else
            curl -s -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              "${{ forgejo.api_url }}/repos/${{ forgejo.repository }}/issues/${PR_NUMBER}/comments" \
              -d "${BODY_JSON}"
          fi

  success:
    if: ${{ !cancelled() }}
    needs:
      - flate
    name: Flate - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
